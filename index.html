<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Biblioteca</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1 class="header__title">📚 Mi Biblioteca</h1>
      <p class="header__subtitle">Mi colección personal de libros</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <div class="search-box">
        <svg class="search-box__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <label for="search-input" class="visually-hidden">Buscar libros</label>
        <input
          type="text"
          id="search-input"
          class="search-box__input"
          placeholder="Buscar por título o autor..."
          autocomplete="off"
        >
      </div>

      <div class="filters">
        <label for="filter-genre" class="visually-hidden">Filtrar por género</label>
        <select id="filter-genre" class="filters__select">
          <option value="todos">Todos los géneros</option>
        </select>

        <label for="sort-by" class="visually-hidden">Ordenar por</label>
        <select id="sort-by" class="filters__select">
          <option value="title">Ordenar por título</option>
          <option value="author">Ordenar por autor</option>
          <option value="genre">Ordenar por género</option>
          <option value="year">Ordenar por año</option>
        </select>
      </div>

      <div class="stats" aria-live="polite">
        <span id="book-count">0 libros</span>
      </div>
    </section>

    <nav id="genre-nav" class="genre-nav" aria-label="Navegación por género" hidden>
      <!-- Se genera dinámicamente al ordenar por género -->
    </nav>

    <section id="books-container" class="books-container" aria-label="Colección de libros">
      <!-- Los libros se cargan dinámicamente -->
    </section>

    <div id="no-results" class="no-results" hidden>
      <p>No se encontraron libros con esos criterios 🔍</p>
    </div>
  </main>

  <!-- Modal de detalle -->
  <div id="book-modal" class="modal" hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal__close" aria-label="Cerrar detalle">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="modal__body">
        <div class="modal__cover">
          <img id="modal-cover" src="" alt="">
        </div>
        <div class="modal__info">
          <h2 id="modal-title" class="modal__title"></h2>
          <p id="modal-author" class="modal__author"></p>
          <p id="modal-description" class="modal__description"></p>
          <dl class="modal__details">
            <div class="modal__detail-row">
              <dt>Edición</dt>
              <dd id="modal-edition"></dd>
            </div>
            <div class="modal__detail-row">
              <dt>Género</dt>
              <dd id="modal-genre"></dd>
            </div>
            <div class="modal__detail-row">
              <dt>Páginas</dt>
              <dd id="modal-pages"></dd>
            </div>
            <div class="modal__detail-row">
              <dt>ISBN</dt>
              <dd id="modal-isbn"></dd>
            </div>
            <div class="modal__detail-row">
              <dt>Estado</dt>
              <dd id="modal-status"></dd>
            </div>
            <div id="modal-notes-row" class="modal__detail-row" hidden>
              <dt>Notas</dt>
              <dd id="modal-notes"></dd>
            </div>
          </dl>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>Mi colección personal — ¿Te interesa alguno? ¡Escribime!</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
